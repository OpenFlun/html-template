<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双因素验证处理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            letter-spacing: 4px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #5a6fd8;
        }

        .btn:disabled {
            background: #b0b0b0;
            cursor: not-allowed;
            opacity: 0.65;
        }

        .error {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        .backup-link {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }

        .backup-link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>双因素验证</h2>
        <form onsubmit="return false;">
            <p style="text-align:center; margin-bottom:20px; color:#666;">请输入身份验证器中的6位数字验证码</p>
            <div class="form-group">
                <input type="text" id="token" placeholder="在此输入6位验证码" maxlength="6" autofocus
                    autocomplete="one-time-code">
            </div>
            <button class="btn" id="verifyBtn">验证</button>
        </form>
        <div class="error" id="message"></div>
        <div class="backup-link">
            <a href="#" id="useBackup">使用备用码</a>
        </div>
    </div>

    <script>
        const [verifyBtn, tokenEl, messageDiv, useBackup] = ['verifyBtn', 'token', 'message', 'useBackup']
            .map(id => document.getElementById(id)),
            handleError = msg => {
                messageDiv.textContent = msg, tokenEl.value = '', verifyBtn.disabled = false, tokenEl.focus();
            },
            verify = async () => {
                verifyBtn.disabled = true; messageDiv.textContent = '';
                const token = tokenEl.value.trim();
                if (!token) return handleError('请输入验证码');
                try {
                    const response = await fetch('/api/verify-2fa', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token })
                    }), data = await response.json();
                    if (response.ok) tokenEl.value = '', window.location.href = '/';
                    else handleError(data.message);
                } catch (err) { handleError('网络错误，请稍后重试') }
            }
        verifyBtn.addEventListener('click', verify);
        useBackup.addEventListener('click', e => {
            e.preventDefault(), tokenEl.placeholder = '请输入10位备用码', tokenEl.maxLength = 10, tokenEl.value = '';
            useBackup.style.display = 'none'; tokenEl.focus();
        });
        tokenEl.addEventListener('keypress', e => {
            if (e.key === 'Enter') verify();
        });
        tokenEl.addEventListener('input', () => messageDiv.textContent = '');
    </script>
</body>

</html>
