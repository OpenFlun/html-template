<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico" />
    <link rel="shortcut icon" type="image/x-icon" href="/static/img/favicon.ico" />
    <title>登录页</title>

    <!-- 引入公共主题变量与全局样式 -->
    <link rel="stylesheet" href="/static/constants.css" /> <!-- 样式常量 -->
    <link rel="stylesheet" href="/static/public.css" /> <!-- 公共样式 -->
    <link rel="stylesheet" href="/static/themeImg.css" /> <!-- 主题图标 -->
    <link rel="stylesheet" href="/static/topImg.css" /> <!-- 返回顶部图标 -->

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 卡片容器 */
        .card {
            background: var(--container-bg);
            border-radius: 12px;
            border: 1px solid #2e3135;
            box-shadow: 0 20px 40px var(--content-shadow);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }

        .card h2 {
            color: var(--h1-color);
            margin-bottom: 30px;
            text-align: center;
            font-weight: 600;
            font-size: 28px;
            border-bottom: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-color);
            font-weight: 500;
            font-size: 14px;
            opacity: 0.85;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--content-border);
            border-radius: 8px;
            font-size: 16px;
            background: var(--li-bg);
            color: var(--text-color);
            transition: border-color 0.2s, background 0.5s ease, color 0.5s ease;
        }

        .form-group input:focus {
            border-color: var(--link-color);
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--btn-bg);
            color: var(--text-color);
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 4px 12px var(--content-shadow);
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .btn:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #b0b0b0;
            cursor: not-allowed;
            opacity: 0.65;
            transform: none;
        }

        .error {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            min-height: 20px;
        }

        .links {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: var(--text-color);
        }

        .links a {
            color: var(--link-color);
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.2s;
        }

        .links a:hover {
            color: var(--link-hover);
            text-decoration: underline;
        }

        /* ==================== 移动端样式适配 (≤640px) ==================== */
        @media (max-width: 640px) {
            body {
                padding: 16px;
            }

            .card {
                max-width: 100%;
                padding: 28px 20px;
                border-radius: 16px;
            }

            .card h2 {
                font-size: 24px;
                margin-bottom: 24px;
            }

            .form-group {
                margin-bottom: 18px;
            }

            .form-group label {
                font-size: 13px;
                margin-bottom: 6px;
            }

            .form-group input {
                font-size: 16px;
                padding: 12px 14px;
            }

            .btn {
                padding: 12px;
                font-size: 16px;
            }

            .links {
                margin-top: 20px;
                font-size: 13px;
            }

            .links a {
                margin: 0 8px;
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 24px 16px;
            }

            .card h2 {
                font-size: 22px;
                margin-bottom: 20px;
            }

            .links a {
                display: inline-block;
                margin: 4px 6px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>登录</h2>
        <form onsubmit="return false;">
            <div class="form-group">
                <label for="username">用户名 / 邮箱</label>
                <input type="text" id="username" placeholder="请输入用户名或邮箱" maxlength="50" autofocus
                    autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" maxlength="72" autocomplete="current-password">
            </div>
            <button type="button" class="btn" id="loginBtn">登录</button>
        </form>
        <div class="error" id="message"></div>
        <div class="links">
            <a href="/forgot-password">忘记密码？</a>
            <!-- <a href="/register">注册新账号</a> -->
        </div>
    </div>

    <!-- 公共逻辑 -->
    <script src="/static/themeModule.js" defer></script>
    <script src="/static/mouseOrTouch.js" defer></script>
    <script src="/static/themeImg.js" defer></script>
    <script src="/static/topImg.js" defer></script>
    <script>
        const [usernameEl, passwordEl, messageDiv, loginBtn,] = ['username', 'password', 'message', 'loginBtn',]
            .map(id => document.getElementById(id)),
            handleError = msg => {
                messageDiv.textContent = msg, loginBtn.disabled = false;
            };

        // 登录主逻辑(统一跳转到2fa页面,携带对应验证方式)
        loginBtn.addEventListener('click', async () => {
            loginBtn.disabled = true, messageDiv.textContent = '';

            const [username, password] = [usernameEl, passwordEl].map(input => input.value.trim());
            if (!username || !password) return handleError('请输入用户名和密码');
            try {
                const response = await fetch('/api/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                }), data = await response.json();

                if (!response.ok) return handleError(data.message);
                if (data.requireWebAuthn)
                    window.location.href = `/2fa?method=webauthn&username=${encodeURIComponent(username)}`;
                else if (data.require2FA)
                    window.location.href = `/2fa?method=totp&username=${encodeURIComponent(username)}`;
                else if (data.success) window.location.href = '/'; // 无二次验证,直接进入首页
                else handleError(data.message);
            } catch (err) { handleError(err.message) }
        });

        // 输入时清除错误消息
        [usernameEl, passwordEl].forEach(el => el.addEventListener('input', () => messageDiv.textContent = ''));
        passwordEl.addEventListener('keypress', e => {
            if (e.key === 'Enter') loginBtn.click();
        });
    </script>
</body>

</html>
