<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!--网站关键字-->
	<meta name="keywords" content=[!keywords]""[~keywords] />
	<!--网站描述-->
	<meta name="description" content=[!description]""[~description] />
	<!--页面定时跳转 值([秒],地址)-->
	<meta http-equiv="refresh" content=[!refresh]""[~refresh] />
	<!--标题栏显示图标-->
	<link rel=" icon" type="image/x-icon" href=[!favicon]"/static/img/favicon.ico"[~favicon] />
	<!--收藏栏显示图标-->
	<link rel="shortcut icon" type="image/x-icon" href=[!shortcutIcon]"/static/img/favicon.ico"[~shortcutIcon] />
	<!-- 网站标题 -->
	<title>[!title][~title]</title>
	<link rel="stylesheet" href="/static/constants.css" /> <!-- 样式常量 -->
	<link rel="stylesheet" href="/static/public.css" /> <!-- 公共样式 -->
	<link rel="stylesheet" href="/static/themeImg.css" /> <!-- 主题图标 -->
	<link rel="stylesheet" href="/static/topImg.css" /> <!-- 返回顶部图标 -->
	<style>
		body {
			display: flex;
			flex-direction: column;
		}

		header {
			position: relative;
			top: 0;
			left: 0;
			width: 100%;
			height: 60px;
			background: var(--header-bg);
			color: var(--text-color);
			padding: 0 24px;
			box-shadow: var(--header-shadow);
			display: flex;
			align-items: center;
			justify-content: flex-end;
			gap: 20px;
		}

		header .home-link {
			color: var(--header-text);
			background: var(--link-bg);
			font-weight: 500;
			padding: 8px 12px;
			border-radius: 6px;
			transition: all 0.3s ease;
			white-space: nowrap;
		}

		header .home-link:hover {
			background: var(--link-hover-bg);
			transform: translateY(-2px);
			text-decoration: none;
		}

		/* 主内容容器样式 */
		.container {
			max-width: 900px;
			margin: 40px auto;
			padding: 30px;
			background: var(--container-bg);
			border-radius: 12px;
			box-shadow: var(--container-shadow);
			text-align: center;
		}

		/* 页脚样式 */
		footer {
			background: var(--footer-bg);
			color: var(--text-color);
			text-align: center;
			padding: 20px;
			margin-top: auto;
			font-size: 0.9em;
		}

		/* 一级标题样式 */
		h1 {
			color: var(--h1-color);
			border-bottom: 3px solid var(--h1-border);
			padding-bottom: 12px;
			display: inline-block;
			margin: 0 auto 15px;
			font-size: 2.2rem;
			font-weight: 700;
		}

		/* 二级标题样式 */
		h2 {
			color: var(--h2-color);
			margin-bottom: 15px;
			font-size: 1.8rem;
		}

		/* 段落样式 */
		p {
			color: var(--p-color);
			line-height: 1.7;
			margin: 15px 0;
			font-size: 1.1rem;
		}

		/* 无序列表容器样式 */
		ul {
			display: inline-block;
			text-align: left;
			padding-left: 0;
			margin: 20px 0;
			list-style-type: none;
		}

		/* 列表项样式 */
		ul li {
			background: var(--li-bg);
			margin: 12px 0;
			padding: 15px 25px;
			border-radius: 6px;
			font-size: 1.1rem;
			box-shadow: var(--item-shadow);
			transition: all 0.3s ease;
		}

		/* 列表项悬停效果 */
		ul li:hover {
			background: var(--li-hover);
			transform: translateX(5px);
		}

		/* 通用链接样式 */
		a {
			color: var(--link-color);
			transition: all 0.3s ease;
		}

		/* 链接悬停效果 */
		a:hover {
			color: var(--link-hover);
			text-decoration: underline;
		}

		/* 按钮样式 */
		.btn {
			display: inline-block;
			background: var(--btn-bg);
			color: var(--text-color);
			padding: 12px 28px;
			border-radius: 6px;
			text-decoration: none;
			margin-top: 25px;
			font-weight: 600;
			font-size: 1.05rem;
			box-shadow: var(--btn-shadow);
			transition: all 0.3s ease;
		}

		/* 按钮悬停效果 */
		.btn:hover {
			background: var(--btn-hover);
			transform: translateY(-3px);
			box-shadow: var(--btn-shadow-hover);
			text-decoration: none;
		}
	</style>
	[!style]<!-- 样式区域 -->[~style]
</head>

<body onload="document.body.classList.add('page-ready')">

	<header>
		[!header]<a href="index.html" class="home-link">← 返回首页</a>[~header]

		[!my]
		<!-- 个人中心按钮 注意: 此按钮仅在用户启用登录并成功登录后显示 -->
		<div id="userCenter" class="user-center" hidden>
			<a href="/profile">👤 个人中心</a>
		</div>
		[~my]
	</header>
	<div class="container">
		<!-- 默认内容区域 -->
		[!content]
		[!test][~test]<!-- 嵌套标签可以写,但会被忽略为普通标签,最终会被清理 -->
		[~content]
	</div>

	[!variables]
	<!-- 变量替换测试 -->
	<div style="background: #459064; padding: 15px; margin: 20px 0; border-radius: 5px;">
		<h3>模板功能测试 - 变量替换</h3>
		<p>当前年份: {{year}}</p>
		<p>时间戳: {{timestamp}}</p>
		<p>基础URL: {{baseUrl}}</p>
	</div>
	[~variables]

	<footer>
		<!-- 脚本 -->
		[!footer][~footer]
	</footer>

	<!-- 公共逻辑 -->
	<script src="/static/auth.js" defer></script><!-- 登录状态检测 -->
	<script src="/static/themeModule.js" defer></script><!-- 引入主题自适应模块 -->
	<script src="/static/mouseOrTouch.js" defer></script><!-- 引入鼠标或触摸操作 -->
	<script src="/static/themeImg.js" defer></script> <!-- 引入主题图标模块 -->
	<script src="/static/topImg.js" defer></script> <!-- 引入返回顶部图标模块 -->
	[!script]

	[~script]
</body>

</html>
